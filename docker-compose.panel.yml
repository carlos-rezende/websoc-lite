services:
  soc-panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    container_name: soc-lite-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REPORTS_DIR=/data/reports
      - ANOMALY_THRESHOLD=0.35
      - SCANNER_CONTAINER_NAME=soc-scanner
      - PANEL_CONTROL_TOKEN=${PANEL_CONTROL_TOKEN:-}
    volumes:
      - ./reports:/data/reports
      - /var/run/docker.sock:/var/run/docker.sock
